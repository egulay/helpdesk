helpdesk:
  ai:
    enabled: true
    provider: lm-studio
    lm-studio:
      base-url: http://localhost:1234/v1
      model: unsloth/Qwen3-Coder-30B-A3B-Instruct-GGUF
    openai:
      base-url: https://api.openai.com/v1
      model: gpt-5.2
  mcp:
    allow-mutations: false

spring:
  application:
    name: helpdesk
  main:
    banner-mode: console
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
  mvc:
    async:
      request-timeout: 300000 # 5 minutes
  cloud:
    vault:
      enabled: true
      uri: ${VAULT_ADDR}
      token: ${VAULT_TOKEN}
      kv:
        enabled: true
        backend: secret
        application-name: ${spring.application.name}
  ai:
    mcp:
      server:
        enabled: true
        name: helpdesk-api-mcp-server
        version: 1.0.0
        type: SYNC
        protocol: STREAMABLE
        streamable-http:
          mcp-endpoint: /mcp
        request-timeout: 5m

springdoc:
  api-docs:
    path: /api-docs
    enabled: ${HELPDESK_OPENAPI_ENABLED:true}
  swagger-ui:
    enabled: ${HELPDESK_OPENAPI_ENABLED:true}
  show-actuator: true

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS:health,info}

server:
  port: 8888
  http2:
    enabled: true
  error:
    include-message: never
    include-binding-errors: never

---
spring:
  config:
    activate:
      on-profile: "!test"
    import: optional:vault://
