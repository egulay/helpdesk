helpdesk:
  ai:
    provider: lm-studio
    lm-studio:
      base-url: http://localhost:1234/v1
      model: unsloth/Qwen3-Coder-30B-A3B-Instruct-GGUF
    openai:
      base-url: https://api.openai.com/v1
      model: gpt-5.2

spring:
  application:
    name: helpdesk
  config:
    import: optional:vault://
  main:
    banner-mode: console
  mvc:
    async:
      request-timeout: 300000 # 5 minutes
  cloud:
    vault:
      enabled: true
      uri: ${VAULT_ADDR}
      token: ${VAULT_TOKEN}
      kv:
        enabled: true
        backend: secret
        application-name: ${spring.application.name}
  ai:
    mcp:
      server:
        enabled: true
        name: helpdesk-api-mcp-server
        version: 1.0.0
        type: SYNC
        sse-endpoint: /sse
        sse-message-endpoint: /mcp/message
        request-timeout: 5m

springdoc:
  api-docs:
    path: /api-docs
  show-actuator: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,mappings

server:
  port: 8888
  error:
    include-message: always
    include-binding-errors: always
