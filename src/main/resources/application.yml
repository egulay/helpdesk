spring:
  application:
    name: helpdesk
  config:
    import: optional:vault://
  main:
    banner-mode: console
  cloud:
    vault:
      enabled: true
      uri: ${VAULT_ADDR}
      token: ${VAULT_TOKEN}
      kv:
        enabled: true
        backend: secret
        application-name: ${spring.application.name}
  ai:
    mcp:
      server:
        enabled: true
        name: helpdesk-api-mcp-server
        version: 1.0.0
        type: SYNC
        sse-endpoint: /sse
        sse-message-endpoint: /mcp/message

springdoc:
  api-docs:
    path: /api-docs
  show-actuator: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,mappings

server:
  port: 8888
  error:
    include-message: always
    include-binding-errors: always